<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xynema — Stream Cinema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0b; --bg2: #141414; --surface: #181818; --surface2: #222; --surface3: #333;
      --border: rgba(255, 255, 255, 0.08); --border2: rgba(255, 255, 255, 0.15);
      --gold: #c9a84c; --gold2: #e8c96a; --text: #f5f5f5; --text2: rgba(245, 245, 245, 0.7);
      --muted: #808080;
      --font-display: 'Playfair Display', serif; --font-heading: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --radius: 4px; --glow-gold: 0 0 40px rgba(201, 168, 76, 0.15);
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

    /* ── NAV ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 60px; background: rgba(11, 11, 11, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .logo { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 0; }
    .logo-x { color: var(--gold); display: inline-block; font-size: 1.7rem; line-height: 1; margin-right: 1px; }
    .logo-tagline { font-family: var(--font-body); font-size: 0.6rem; font-weight: 400; color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase; margin-left: 10px; border-left: 1px solid var(--border2); padding-left: 10px; line-height: 1.3; }
    .nav-right { display: flex; align-items: center; gap: 0.5rem; }
    .nav-btn { background: none; border: none; color: var(--text2); font-family: var(--font-heading); font-size: 0.75rem; font-weight: 600; padding: 8px 16px; border-radius: 100px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.1em; text-transform: uppercase; }
    .nav-btn:hover { color: var(--gold); background: rgba(201, 168, 76, 0.06); }

    /* ── HERO ── */
    .hero { padding: 110px 3rem 50px; max-width: 900px; position: relative; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-heading); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
    .hero-eyebrow::before { content: ''; display: block; width: 28px; height: 1px; background: var(--gold); opacity: 0.6; }
    .hero h1 { font-family: var(--font-display); font-size: clamp(2.8rem, 8vw, 5.5rem); font-weight: 400; line-height: 1; letter-spacing: -0.01em; margin-bottom: 1rem; }
    .hero h1 em { font-style: italic; color: var(--gold); display: block; }
    .hero p { font-size: 0.95rem; color: var(--text2); max-width: 500px; line-height: 1.6; font-weight: 300; margin-bottom: 2rem; }

    /* ── SEARCH ── */
    .search-stack { display: flex; flex-direction: column; gap: 10px; max-width: 640px; }
    .search-wrap { display: flex; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); overflow: hidden; transition: border-color 0.25s, box-shadow 0.25s; }
    .search-wrap:focus-within { border-color: rgba(201, 168, 76, 0.4); box-shadow: var(--glow-gold); }
    #search-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--font-body); font-size: 0.95rem; padding: 14px 18px; width: 100%; }
    #search-input::placeholder { color: var(--muted); }
    #search-btn { background: var(--gold); border: none; color: var(--bg); font-family: var(--font-heading); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 0 24px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    #search-btn:hover { background: var(--gold2); }

    /* ── GENRE CHIPS ── */
    .genre-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 3rem; margin: 2rem 0 3rem; }
    .chip { background: transparent; border: 1px solid var(--border2); color: var(--text2); font-family: var(--font-heading); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; cursor: pointer; transition: all 0.2s; }
    .chip:hover, .chip.active { border-color: var(--gold); color: var(--gold); background: rgba(201, 168, 76, 0.06); }
    .chip.active { background: var(--gold); color: var(--bg); }

    /* ── SECTION ── */
    .section { padding: 0 3rem 4rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border); }
    .section-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; position: relative; }
    .section-title::after { content: ''; position: absolute; left: 0; bottom: -4px; width: 40px; height: 2px; background: var(--gold); border-radius: 2px; }
    .section-count { font-family: var(--font-heading); font-size: 0.65rem; font-weight: 600; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

    /* ── FILM GRID & CARDS ── */
    .film-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px 12px; }
    .film-card { background: transparent; border: none; cursor: pointer; display: flex; flex-direction: column; transition: filter 0.2s; }
    .film-card:hover { filter: brightness(1.15); }
    .poster-wrap { position: relative; aspect-ratio: 2/3; background: var(--surface2); overflow: hidden; width: 100%; border-radius: var(--radius); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .poster-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 12px; background: linear-gradient(160deg, #181818 0%, #0e0e0e 100%); }
    .poster-placeholder span { font-family: var(--font-display); font-size: 0.8rem; color: rgba(245, 240, 232, 0.45); text-align: center; line-height: 1.3; }

    .play-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .film-card:hover .play-overlay { opacity: 1; }
    .play-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; transform: scale(0.9); transition: transform 0.2s; }
    .film-card:hover .play-btn { transform: scale(1); }
    .play-btn svg { fill: var(--bg); margin-left: 2px; }

    /* BADGES */
    .badge-quality { position: absolute; top: 4px; left: 4px; background: #e50914; color: #fff; font-family: Arial, sans-serif; font-size: 0.55rem; font-weight: 800; padding: 2px 4px; border-radius: 2px; z-index: 5; }
    .badge-rating { position: absolute; top: 4px; right: 4px; background: #f5c518; color: #000; font-family: Arial, sans-serif; font-size: 0.6rem; font-weight: 800; padding: 2px 5px; border-radius: 2px; z-index: 5; }

    /* TEXT UNDER POSTER */
    .card-info { padding: 6px 0 0; }
    .card-title { font-family: var(--font-body); font-size: 0.8rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── MODAL ── */
    #modal-bg { position: fixed; inset: 0; z-index: 400; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); display: none; align-items: flex-end; justify-content: center; }
    #modal-bg.open { display: flex; }
    #modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; animation: slideUp 0.2s ease-out; }
    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-close { position: absolute; top: 15px; right: 15px; background: var(--surface2); border: none; color: var(--muted); width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-inner { display: grid; grid-template-columns: 180px 1fr; gap: 2rem; }
    .modal-poster { border-radius: var(--radius); overflow: hidden; aspect-ratio: 2/3; background: var(--surface2); }
    .modal-poster img { width: 100%; height: 100%; object-fit: cover; }
    .modal-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; line-height: 1.1; margin-bottom: 0.8rem; }
    .modal-meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
    .meta-pill { background: var(--surface2); border: 1px solid var(--border2); font-family: var(--font-heading); font-size: 0.65rem; font-weight: 600; padding: 4px 10px; border-radius: 100px; color: var(--text2); }
    .modal-plot { font-size: 0.9rem; line-height: 1.6; color: var(--text2); margin-bottom: 1.5rem; }
    .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-watch { background: var(--gold); color: var(--bg); font-family: var(--font-heading); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; padding: 12px 24px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; border: none; }
    .btn-imdb { background: none; border: 1px solid var(--border2); color: var(--text2); font-family: var(--font-heading); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; padding: 11px 20px; border-radius: 6px; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px; }

    /* ── PLAYER ── */
    #player-bg { position: fixed; inset: 0; z-index: 500; background: #000; display: none; flex-direction: column; }
    #player-bg.open { display: flex; }
    .player-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: rgba(11, 11, 11, 0.98); }
    .player-logo { font-family: var(--font-heading); font-size: 0.8rem; font-weight: 800; color: var(--gold); text-transform: uppercase; }
    .player-title { font-family: var(--font-body); font-size: 0.9rem; color: var(--text2); flex: 1; text-align: center; }
    .player-close { background: none; border: 1px solid var(--border2); color: var(--muted); font-size: 0.7rem; padding: 6px 14px; border-radius: 100px; cursor: pointer; text-transform: uppercase;}
    #player-frame { flex: 1; width: 100%; border: none; background: #000; }

    /* ── UTILS ── */
    .scroll-loader { text-align: center; padding: 2rem 0; color: var(--muted); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .state-msg { padding: 4rem 0; text-align: center; color: var(--muted); grid-column: 1 / -1; }
    
    /* ── MOBILE OPTIMIZATIONS ── */
    @media (max-width: 768px) {
      nav { padding: 0 1.5rem; }
      .logo-tagline { display: none; }
      .hero { padding: 90px 1.5rem 30px; }
      .hero h1 { font-size: 2.2rem; }
      .genre-row { padding: 0 1.5rem; margin-bottom: 2rem; }
      .section { padding: 0 1.5rem 2rem; }
      
      /* Crucial: Tighter Grid for Mobile */
      .film-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 14px 8px; }
      .card-info { padding: 4px 0 0; }
      .card-title { font-size: 0.75rem; }
      
      .modal-inner { grid-template-columns: 1fr; gap: 1rem; }
      .modal-poster { display: none; /* Hide poster on mobile modal to save space */ }
      #modal { padding: 1.5rem; }
      .modal-title { font-size: 1.5rem; }
      .btn-watch, .btn-imdb { flex: 1; justify-content: center; }
    }
  </style>
</head>

<body>

  <nav>
    <a class="logo" onclick="showHome()">
      <span class="logo-x">X</span>ynema
      <span class="logo-tagline">Stream Cinema</span>
    </a>
    <div class="nav-right">
      <button class="nav-btn" onclick="showHome()">Trending</button>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">Lightning Fast Streaming</div>
    <h1>Cinema Without<em>Boundaries.</em></h1>
    <p>Search thousands of titles, instantly load your favorites, and stream directly on any device.</p>

    <div class="search-stack">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search movies, series, or actors..." autocomplete="off" />
        <button id="search-btn" onclick="doSearch()">Search</button>
      </div>
    </div>
  </div>

  <div class="genre-row" id="genre-row"></div>

  <main>
    <div class="section" id="results-section" style="display:none;">
      <div class="section-header">
        <div class="section-title" id="results-heading">Results</div>
        <div class="section-count" id="results-count"></div>
      </div>
      <div id="results-grid" class="film-grid"></div>
      <div id="results-observer" class="scroll-loader">Loading...</div>
    </div>

    <div class="section" id="featured-section">
      <div class="section-header">
        <div class="section-title">Discover Films</div>
        <div class="section-count" id="trending-count"></div>
      </div>
      <div id="trending-grid" class="film-grid"></div>
      <div id="home-observer" class="scroll-loader">Loading...</div>
    </div>
  </main>

  <div id="modal-bg">
    <div id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-inner">
        <div class="modal-poster"><img id="m-poster" src="" alt="" /></div>
        <div>
          <div class="modal-title" id="m-title"></div>
          <div class="modal-meta-row" id="m-meta"></div>
          <p class="modal-plot" id="m-plot"></p>
          <div class="modal-actions">
            <a class="btn-watch" id="m-watch" href="#" onclick="openPlayer(event)">Watch Now</a>
            <a class="btn-imdb" id="m-imdb" href="#" target="_blank">IMDB</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="player-bg">
    <div class="player-topbar">
      <div class="player-logo">Xynema</div>
      <div class="player-title" id="player-title"></div>
      <button class="player-close" onclick="closePlayer()">Close</button>
    </div>
    <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>
  </div>

  <script>
    // ── CONFIG ──
    const OMDB_KEY = 'trilogy';
    const OMDB = q => `https://www.omdbapi.com/?${q}&apikey=${OMDB_KEY}`;

    let currentQuery = '';
    let searchPage = 1;
    let searchTotal = 0;
    
    // Arrays of terms to cycle through for infinite "Discovery" scrolling
    const HOME_TERMS = ['marvel', 'batman', 'star', 'lord', 'matrix', 'harry', 'ring', 'fast', 'spider', 'dark', 'love', 'war', 'blood', 'alien'];
    let homeIndex = 0;
    let homePage = 1;
    let isFetching = false;
    let loadedCount = 0;

    const GENRES = ['Action', 'Comedy', 'Drama', 'Horror', 'Sci-Fi', 'Thriller', 'Romance', 'Animation', 'Crime'];

    // ── INTERSECTION OBSERVERS (The secret to fast infinite scrolling) ──
    const homeObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && document.getElementById('featured-section').style.display !== 'none') {
        fetchHomeBatch();
      }
    }, { rootMargin: "400px" }); // Fetch 400px before user reaches bottom

    const searchObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && document.getElementById('results-section').style.display !== 'none') {
        if (searchPage * 10 < searchTotal) {
          searchPage++;
          fetchSearchBatch();
        } else {
          document.getElementById('results-observer').style.display = 'none';
        }
      }
    }, { rootMargin: "400px" });

    // ── INIT ──
    function init() {
      renderGenres();
      homeObserver.observe(document.getElementById('home-observer'));
      searchObserver.observe(document.getElementById('results-observer'));

      document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
      });
      document.getElementById('modal-bg').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
    }

    function renderGenres() {
      const row = document.getElementById('genre-row');
      GENRES.forEach(g => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = g;
        chip.onclick = () => {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          document.getElementById('search-input').value = g;
          doSearch();
        };
        row.appendChild(chip);
      });
    }

    // ── FETCH HOME/DISCOVER BATCH (Lightning Fast - No Vidsrc Precheck) ──
    async function fetchHomeBatch() {
      if (isFetching) return;
      isFetching = true;
      
      const term = HOME_TERMS[homeIndex % HOME_TERMS.length];
      try {
        const res = await fetch(OMDB(`s=${term}&type=movie&page=${homePage}`));
        const data = await res.json();
        
        if (data.Response === 'True' && data.Search) {
          appendGrid('trending-grid', data.Search);
          loadedCount += data.Search.length;
          document.getElementById('trending-count').textContent = loadedCount + ' films loaded';
          
          homePage++;
          if (homePage > 3) { // Switch term after 3 pages to mix it up
            homePage = 1;
            homeIndex++;
          }
        } else {
          homePage = 1;
          homeIndex++;
        }
      } catch (e) { console.error(e); }
      
      isFetching = false;
    }

    // ── SEARCH LOGIC ──
    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;

      currentQuery = q;
      searchPage = 1;
      searchTotal = 0;

      document.getElementById('featured-section').style.display = 'none';
      document.getElementById('results-section').style.display = 'block';
      document.getElementById('results-heading').textContent = `"${q}"`;
      document.getElementById('results-grid').innerHTML = '';
      document.getElementById('results-observer').style.display = 'block';
      
      await fetchSearchBatch();
    }

    async function fetchSearchBatch() {
      if (isFetching) return;
      isFetching = true;

      try {
        const res = await fetch(OMDB(`s=${encodeURIComponent(currentQuery)}&type=movie&page=${searchPage}`));
        const data = await res.json();

        if (data.Response === 'True' && data.Search) {
          searchTotal = parseInt(data.totalResults) || 0;
          appendGrid('results-grid', data.Search);
          document.getElementById('results-count').textContent = `${searchTotal} total results`;
        } else if (searchPage === 1) {
          document.getElementById('results-grid').innerHTML = '<div class="state-msg">No results found.</div>';
          document.getElementById('results-observer').style.display = 'none';
        }
      } catch (e) {
        if(searchPage === 1) document.getElementById('results-grid').innerHTML = '<div class="state-msg">Network error.</div>';
      }
      isFetching = false;
    }

    // ── UI HELPERS ──
    function appendGrid(containerId, films) {
      const html = films.map(f => {
        const title = f.Title.replace(/'/g, "&#39;").replace(/"/g, '&quot;');
        const hasPoster = f.Poster && f.Poster !== 'N/A';
        const img = hasPoster ? `<img src="${f.Poster}" alt="${title}" loading="lazy">` : `<div class="poster-placeholder"><span>${title}</span></div>`;
        const badge = Math.random() > 0.7 ? 'BLURAY' : 'WEB-DL'; // Fake badge for UI flair
        
        return `
          <div class="film-card" onclick="openModal('${f.imdbID}')">
            <div class="poster-wrap">
              ${img}
              <div class="badge-quality">${badge}</div>
              <div class="play-overlay"><div class="play-btn"><svg width="18" height="18" viewBox="0 0 18 18"><polygon points="5,3 15,9 5,15"/></svg></div></div>
            </div>
            <div class="card-info">
              <div class="card-title" title="${title}">${f.Title} (${f.Year})</div>
            </div>
          </div>`;
      }).join('');
      
      document.getElementById(containerId).insertAdjacentHTML('beforeend', html);
    }

    function showHome() {
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('featured-section').style.display = 'block';
      document.getElementById('search-input').value = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── MODAL & PLAYER ──
    async function openModal(imdbID) {
      document.getElementById('modal-bg').classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('m-plot').textContent = 'Loading...';
      
      try {
        const res = await fetch(OMDB(`i=${imdbID}&plot=short`));
        const d = await res.json();
        
        if (d.Response === 'True') {
          if (d.Poster !== 'N/A') document.getElementById('m-poster').src = d.Poster;
          document.getElementById('m-title').textContent = d.Title;
          document.getElementById('m-plot').textContent = d.Plot !== 'N/A' ? d.Plot : 'No description available.';
          document.getElementById('m-meta').innerHTML = `
            ${d.imdbRating !== 'N/A' ? `<span class="meta-pill">★ ${d.imdbRating}</span>` : ''}
            <span class="meta-pill">${d.Year}</span>
            <span class="meta-pill">${d.Runtime}</span>
          `;
          
          document.getElementById('m-watch').onclick = (e) => {
            e.preventDefault();
            openPlayer(imdbID, d.Title);
          };
          document.getElementById('m-imdb').href = `https://www.imdb.com/title/${imdbID}/`;
        }
      } catch (e) {
        document.getElementById('m-plot').textContent = 'Error loading details.';
      }
    }

    function closeModal() {
      document.getElementById('modal-bg').classList.remove('open');
      document.body.style.overflow = '';
    }

    function openPlayer(imdbID, title) {
      document.getElementById('modal-bg').classList.remove('open');
      document.getElementById('player-title').textContent = title;
      // Using vidsrc.to as requested in original code
      document.getElementById('player-frame').src = `https://vidsrc.to/embed/movie/${imdbID}`;
      document.getElementById('player-bg').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closePlayer() {
      document.getElementById('player-bg').classList.remove('open');
      document.getElementById('player-frame').src = '';
      document.body.style.overflow = '';
    }

    init();
  </script>
</body>
</html>
