<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xynema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080810;
      --surface: #111120;
      --surface2: #1f1f3a;
      --border: rgba(255, 255, 255, 0.06);
      --gold: #c9a84c;
      --gold2: #e8c96a;
      --text: #f5f0e8;
      --text2: rgba(245, 240, 232, 0.65);
      --radius: 8px;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 3rem;
      background: linear-gradient(to bottom, rgba(8, 8, 16, 0.97), rgba(8, 8, 16, 0.7));
      border-bottom: 0.5px solid var(--border);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
    }

    .nav-right {
      display: flex;
      gap: 0.5rem;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 100px;
      cursor: pointer;
      transition: 0.2s;
      text-transform: uppercase;
    }

    .nav-btn:hover {
      color: var(--gold);
      background: rgba(201, 168, 76, 0.06);
    }

    .hero {
      padding: 130px 3rem 70px;
      max-width: 900px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.2rem, 8vw, 6.5rem);
      margin-bottom: 1.5rem;
    }

    .hero h1 em {
      display: block;
      color: var(--gold);
    }

    .hero p {
      color: var(--text2);
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .search-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 640px;
    }

    .search-wrap {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    #search-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      padding: 15px 20px;
      font-size: 0.95rem;
    }

    #search-btn {
      background: var(--gold);
      border: none;
      color: var(--bg);
      padding: 0 28px;
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
    }

    #search-btn:hover {
      background: var(--gold2);
    }

    .genre-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 3rem;
      margin: 2rem 0 3.5rem;
    }

    .chip {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      padding: 7px 18px;
      border-radius: 100px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      transition: 0.22s;
    }

    .chip:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 168, 76, 0.06);
    }

    .chip.active {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    .section {
      padding: 0 3rem 5rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 40px;
      height: 2px;
      background: var(--gold);
    }

    .section-count {
      margin-left: auto;
      font-family: 'Syne', sans-serif;
      color: var(--text2);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .film-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px 18px;
    }

    .film-card {
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
    }

    .film-card:hover .poster-wrap {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.8);
    }

    .poster-wrap {
      position: relative;
      aspect-ratio: 2/3;
      background: var(--surface2);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.28s, box-shadow 0.28s;
    }

    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .film-card:hover .poster-wrap img {
      transform: scale(1.04);
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to top, rgba(8, 8, 16, 0.9), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .film-card:hover .play-overlay {
      opacity: 1;
    }

    .play-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(0.8);
      transition: transform 0.25s;
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.4);
    }

    .film-card:hover .play-btn {
      transform: scale(1);
    }

    .badge-rating,
    .badge-quality {
      position: absolute;
      top: 6px;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 800;
      z-index: 5;
    }

    .badge-rating {
      right: 6px;
      background: #F5C518;
      color: #000;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .badge-quality {
      left: 6px;
      background: #E50914;
      color: #fff;
    }

    .card-info {
      padding: 8px 2px 0;
    }

    .card-title {
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
    }

    .card-meta {
      font-size: 0.75rem;
      color: var(--text2);
      display: flex;
      gap: 6px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 2rem;
    }

    .pagination button {
      padding: 6px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
    }

    .pagination button:hover {
      background: var(--gold);
      color: var(--bg);
    }

    .state-msg {
      text-align: center;
      color: var(--text2);
      padding: 3rem 0;
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-content {
      position: relative;
      background: var(--surface);
      padding: 20px;
      width: 90%;
      max-width: 900px;
      border-radius: 10px;
    }

    .modal-content iframe {
      width: 100%;
      height: 70vh;
      border: none;
      border-radius: 6px;
    }

    .modal-content .close {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 24px;
      color: var(--gold);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <nav>
    <a class="logo" onclick="showHome()">Xynema</a>
    <div class="nav-right">
      <button class="nav-btn" onclick="showSection('trending')">Trending</button>
      <button class="nav-btn" onclick="showSection('top')">Top 250</button>
      <button class="nav-btn" onclick="showSection('new')">New</button>
    </div>
  </nav>

  <div class="hero">
    <h1>Millions of Films<em>One Click Away</em></h1>
    <p>Discover, explore, and instantly stream from the world's largest film catalogue.</p>
    <div class="search-stack">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search any movie title…" autocomplete="off">
        <button id="search-btn" onclick="doSearch()">SEARCH</button>
      </div>
    </div>
  </div>

  <div class="genre-row" id="genre-row"></div>

  <main>
    <div class="section" id="results-section" style="display:none;">
      <div class="section-header">
        <div class="section-title" id="results-heading">Search Results</div>
        <div class="section-count" id="results-count"></div>
      </div>
      <div id="results-grid" class="film-grid"></div>
      <div class="pagination" id="search-pagination"></div>
    </div>

    <div class="section" id="featured-section">
      <div class="section-header">
        <div class="section-title">Browse All Films</div>
        <div class="section-count" id="trending-count"></div>
      </div>
      <div id="trending-grid" class="film-grid"></div>
      <div class="pagination" id="trending-pagination"></div>
    </div>
  </main>

  <!-- Streaming Modal -->
  <div id="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 class="modal-title"></h2>
      <iframe src="" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    // CONFIG
    const OMDB_KEY = 'trilogy';
    const OMDB = q => `https://www.omdbapi.com/?${q}&apikey=${OMDB_KEY}`;
    const GENRES = ['Action', 'Comedy', 'Drama', 'Horror', 'Sci-Fi', 'Thriller', 'Romance', 'Animation', 'Crime', 'Fantasy', 'Documentary', 'Adventure'];
    const HOME_TERMS = ['love', 'war', 'night', 'dark', 'man', 'woman', 'life', 'dead', 'black', 'white', 'red', 'fire', 'blood', 'city', 'world', 'star', 'king', 'queen', 'son', 'girl'];

    // STATE
    let homeBrowsePage = 1, homeBrowseSeenIds = new Set();
    let currentPage = 1, currentQuery = '';

    // INIT
    function init() {
      renderGenres();
      loadHomeBrowse();
      renderPagination('trending');
      document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    }
    function renderGenres() {
      const row = document.getElementById('genre-row');
      GENRES.forEach(g => {
        const chip = document.createElement('button'); chip.className = 'chip'; chip.textContent = g;
        chip.onclick = () => { document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); chip.classList.add('active'); searchByGenre(g); }
        row.appendChild(chip);
      });
    }

    // HOME BROWSE
    async function loadHomeBrowse() {
      const grid = document.getElementById('trending-grid'); grid.innerHTML = '';
      const collected = []; const seen = homeBrowseSeenIds;
      for (let i = 0; i < HOME_TERMS.length; i++) {
        const term = HOME_TERMS[(i) % HOME_TERMS.length];
        try {
          const res = await fetch(OMDB(`s=${encodeURIComponent(term)}&type=movie&page=${homeBrowsePage}`));
          const data = await res.json();
          if (data.Response === 'True' && data.Search) { data.Search.forEach(m => { if (!seen.has(m.imdbID)) { seen.add(m.imdbID); collected.push(omdbToFilm(m)); } }); }
        } catch { }
        if (collected.length >= 12) break;
      }
      appendGrid('trending-grid', collected);
      document.getElementById('trending-count').textContent = collected.length + ' films';
      renderPagination('trending');
    }

    // PAGINATION
    function renderPagination(type) {
      const container = document.getElementById(type + '-pagination');
      container.innerHTML = `<button onclick="changePage('${type}',-1)">Prev</button><span id="${type}-page-num">${type === 'trending' ? homeBrowsePage : currentPage}</span><button onclick="changePage('${type}',1)">Next</button>`;
    }
    async function changePage(type, delta) {
      if (type === 'trending') { homeBrowsePage = Math.max(1, homeBrowsePage + delta); loadHomeBrowse(); document.getElementById('trending-page-num').textContent = homeBrowsePage; }
      else { currentPage = Math.max(1, currentPage + delta); await doSearch(); document.getElementById('search-pagination').querySelector('span').textContent = currentPage; }
    }

    // FILM CARD
    function filmCard(f) {
      const placeholder = `<div class="poster-placeholder"><span>${f.title}</span></div>`;
      return `<div class="film-card" onclick='openModal(${JSON.stringify(f)})'>
<div class="poster-wrap">${f.poster ? `<img src="${f.poster}" alt="${f.title}" loading="lazy">` : placeholder}
<div class="play-overlay"><div class="play-btn"><svg width="18" height="18"><polygon points="4,2 16,9 4,16"/></svg></div></div>
${f.rating ? `<div class="badge-rating">★ ${f.rating}</div>` : ''}
${f.quality ? `<div class="badge-quality">${f.quality}</div>` : ''}
</div>
<div class="card-info"><div class="card-title">${f.title}</div>
<div class="card-meta"><span class="card-year">${f.year || ''}</span><span class="card-genre">${f.genre || 'Film'}</span></div></div></div>`;
    }
    function appendGrid(containerId, films) { const grid = document.getElementById(containerId); grid.innerHTML = films.map(f => filmCard(f)).join(''); }

    // SEARCH
    async function doSearch() {
      const q = document.getElementById('search-input').value.trim(); if (!q) return;
      currentQuery = q;
      const films = await fetchOMDB(q, currentPage);
      appendGrid('results-grid', films);
      document.getElementById('results-section').style.display = 'block';
      renderPagination('search');
    }
    async function fetchOMDB(query, page) {
      try {
        const res = await fetch(OMDB(`s=${encodeURIComponent(query)}&type=movie&page=${page}`));
        const data = await res.json();
        if (data.Response === 'True' && data.Search) return data.Search.map(omdbToFilm); return [];
      }
      catch { return []; }
    }
    function searchByGenre(genre) { document.getElementById('search-input').value = genre; doSearch(); }
    function omdbToFilm(m) { return { id: m.imdbID, title: m.Title, year: m.Year, rating: '?', genre: 'Film', poster: m.Poster !== 'N/A' ? m.Poster : null, url: `https://www.playimdb.com/title/${m.imdbID}/` }; }

    // MODAL
    function openModal(f) {
      const modal = document.getElementById('modal');
      modal.style.display = 'flex';
      modal.querySelector('.modal-title').textContent = f.title;
      modal.querySelector('iframe').src = f.url;
    }
    function closeModal() {
      const modal = document.getElementById('modal');
      modal.style.display = 'none';
      modal.querySelector('iframe').src = '';
    }
    window.onclick = function (e) { if (e.target === document.getElementById('modal')) closeModal(); }
    function showHome() { document.getElementById('results-section').style.display = 'none'; window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function showSection(type) { showHome(); if (type === 'trending') { loadHomeBrowse(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }

    // INIT
    init();
  </script>
</body>

</html>
